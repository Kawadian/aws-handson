AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  会員制タスク管理 Web アプリのフルスタック構成。
  Cognito / API Gateway / Lambda /
  CloudFront + S3 (OAC) / SQS / SNS / DynamoDB / CloudWatch を
  CloudFormation で一括デプロイするハンズオン教材です。
  スタック作成時にフロントエンドを自動配置し、削除時に自動クリーンアップします。

# =========================================================================== #
# Parameters                                                                   #
# =========================================================================== #
Parameters:
  ProjectName:
    Type: String
    Default: task-app
    Description: リソース名プレフィックス（小文字英数字とハイフンのみ）
    AllowedPattern: '[a-z0-9-]+'
    MinLength: 1
    MaxLength: 20

# =========================================================================== #
# Resources                                                                    #
# =========================================================================== #
Resources:

  # ======================== DynamoDB (Tasks) ============================== #
  TasksTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    Properties:
      TableName: !Sub '${ProjectName}-tasks'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: task_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: task_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: UserCreatedAtIndex
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-tasks'

  UserProfilesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    Properties:
      TableName: !Sub '${ProjectName}-user-profiles'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-profiles'

  # ======================== Cognito ======================================= #
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${ProjectName}-users'
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${ProjectName}-web-client'
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub '${ProjectName}-auth-${AWS::AccountId}'
      UserPoolId: !Ref UserPool

  # ======================== DynamoDB (Audit Log) ========================== #
  AuditLogTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    Properties:
      TableName: !Sub '${ProjectName}-audit-log'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-audit'

  # ======================== SNS =========================================== #
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-notifications'
      DisplayName: Task App Notifications

  # ======================== SQS =========================================== #
  TaskDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-task-dlq'
      MessageRetentionPeriod: 1209600

  TaskQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-task-queue'
      VisibilityTimeout: 60
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TaskDLQ.Arn
        maxReceiveCount: 3

  # ======================== IAM Roles ===================================== #
  AppLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-app-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TaskData
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt TasksTable.Arn
                  - !Sub '${TasksTable.Arn}/index/*'
                  - !GetAtt UserProfilesTable.Arn
        - PolicyName: AuditLog
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt AuditLogTable.Arn
        - PolicyName: SQSPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt TaskQueue.Arn

  WorkerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-worker-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SQSConsume
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt TaskQueue.Arn
        - PolicyName: SNSPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref NotificationTopic
        - PolicyName: DynamoAudit
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: dynamodb:PutItem
                Resource: !GetAtt AuditLogTable.Arn

  S3DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-s3deploy-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Deploy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectName}-frontend-${AWS::AccountId}'
                  - !Sub 'arn:aws:s3:::${ProjectName}-frontend-${AWS::AccountId}/*'
        - PolicyName: CloudFrontInvalidation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: cloudfront:CreateInvalidation
                Resource: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/*'

  # ======================== Lambda Functions =============================== #
  AppFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-app-handler'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt AppLambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          TASKS_TABLE: !Ref TasksTable
          PROFILE_TABLE: !Ref UserProfilesTable
          AUDIT_TABLE: !Ref AuditLogTable
          QUEUE_URL: !Ref TaskQueue
      Code:
        ZipFile: |
          import json, boto3, os, uuid, time
          from datetime import datetime, timezone
          from boto3.dynamodb.conditions import Key
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          tasks_table = dynamodb.Table(os.environ['TASKS_TABLE'])
          profiles_table = dynamodb.Table(os.environ['PROFILE_TABLE'])
          audit_table = dynamodb.Table(os.environ['AUDIT_TABLE'])
          sqs = boto3.client('sqs')
          Q_URL = os.environ['QUEUE_URL']

          CORS = {
            'Content-Type':'application/json',
            'Access-Control-Allow-Origin':'*',
            'Access-Control-Allow-Headers':'Content-Type,Authorization',
            'Access-Control-Allow-Methods':'GET,POST,PUT,DELETE,OPTIONS',
          }

          def res(code, body):
            return {'statusCode':code,'headers':CORS,'body':json.dumps(body,default=str)}

          def now_iso():
            return datetime.now(timezone.utc).replace(microsecond=0).isoformat()

          def parse_body(event):
            body_str = event.get('body')
            return json.loads(body_str if body_str is not None else '{}')

          def ensure_email_present(email):
            if not email:
              raise ValueError('email claim is required')

          def task_item_to_response(item):
            return {
              'id': item.get('task_id', ''),
              'title': item.get('title', ''),
              'completed': bool(item.get('completed', False)),
              'created_at': item.get('created_at', '')
            }

          def audit(user, action, detail=''):
            try:
              audit_table.put_item(Item={'pk':user,'sk':f'{int(time.time()*1000)}#{uuid.uuid4().hex[:8]}','action':action,'detail':detail,'ttl':int(time.time())+86400*30})
            except Exception as e:
              print(f'Audit log error: {e}')

          def enqueue(action, task_id, user):
            try:
              sqs.send_message(QueueUrl=Q_URL,MessageBody=json.dumps({'action':action,'taskId':task_id,'user':user}))
            except Exception as e:
              print(f'SQS enqueue error: {e}')

          def handler(event, ctx):
            m = event['httpMethod']
            p = event.get('path','')
            pp = event.get('pathParameters') or {}
            claims = event.get('requestContext',{}).get('authorizer',{}).get('claims',{})
            uid = claims.get('sub','anonymous')
            email = claims.get('email','')

            if m == 'OPTIONS': return res(200,{})

            try:
              # --- Tasks CRUD ---
              if m == 'GET' and p == '/tasks':
                items = tasks_table.query(
                  IndexName='UserCreatedAtIndex',
                  KeyConditionExpression=Key('user_id').eq(uid),
                  ScanIndexForward=False
                ).get('Items', [])
                return res(200, [task_item_to_response(item) for item in items])

              if m == 'POST' and p == '/tasks':
                b = parse_body(event)
                title = b.get('title','').strip()
                if not title: return res(400,{'error':'title is required'})
                tid = str(uuid.uuid4())
                created_at = now_iso()
                tasks_table.put_item(Item={
                  'user_id': uid,
                  'task_id': tid,
                  'title': title,
                  'completed': False,
                  'created_at': created_at
                })
                audit(uid,'CREATE_TASK',tid)
                enqueue('created',tid,uid)
                return res(201,{'id':tid,'title':title,'completed':False,'created_at':created_at})

              if m == 'PUT' and '/tasks/' in p:
                tid = pp.get('id','')
                b = parse_body(event)
                comp = bool(b.get('completed'))
                try:
                  tasks_table.update_item(
                    Key={'user_id': uid, 'task_id': tid},
                    UpdateExpression='SET completed = :completed',
                    ConditionExpression='attribute_exists(user_id)',
                    ExpressionAttributeValues={':completed': comp}
                  )
                except ClientError as e:
                  if e.response['Error']['Code'] == 'ConditionalCheckFailedException':
                    return res(404,{'error':'not found'})
                  raise
                audit(uid,'UPDATE_TASK',tid)
                return res(200,{'id':tid,'completed':comp})

              if m == 'DELETE' and '/tasks/' in p:
                tid = pp.get('id','')
                try:
                  tasks_table.delete_item(
                    Key={'user_id': uid, 'task_id': tid},
                    ConditionExpression='attribute_exists(user_id)'
                  )
                except ClientError as e:
                  if e.response['Error']['Code'] == 'ConditionalCheckFailedException':
                    return res(404,{'error':'not found'})
                  raise
                audit(uid,'DELETE_TASK',tid)
                enqueue('deleted',tid,uid)
                return res(200,{'message':'deleted'})

              # --- Profile ---
              if m == 'GET' and p == '/profile':
                ensure_email_present(email)
                item = profiles_table.get_item(Key={'user_id': uid}).get('Item')
                if not item:
                  item = {
                    'user_id': uid,
                    'email': email,
                    'display_name': email.split("@")[0],
                    'created_at': now_iso()
                  }
                  profiles_table.put_item(Item=item)
                return res(200,item)

              if m == 'PUT' and p == '/profile':
                b = parse_body(event)
                dn = b.get('display_name','').strip()
                if not dn: return res(400,{'error':'display_name is required'})
                try:
                  profiles_table.update_item(
                    Key={'user_id': uid},
                    UpdateExpression='SET display_name = :display_name',
                    ConditionExpression='attribute_exists(user_id)',
                    ExpressionAttributeValues={
                      ':display_name': dn
                    }
                  )
                except ClientError as e:
                  if e.response['Error']['Code'] == 'ConditionalCheckFailedException':
                    return res(404,{'error':'profile not found'})
                  raise
                audit(uid,'UPDATE_PROFILE',dn)
                return res(200,{'display_name':dn})

              return res(404,{'error':'not found'})
            except Exception as e:
              print(f'Error: {e}')
              return res(500,{'error':str(e)})

  WorkerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-worker'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt WorkerLambdaRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          SNS_TOPIC: !Ref NotificationTopic
          AUDIT_TABLE: !Ref AuditLogTable
      Code:
        ZipFile: |
          import json, boto3, os, time, uuid
          sns = boto3.client('sns')
          ddb = boto3.resource('dynamodb').Table(os.environ['AUDIT_TABLE'])
          TOPIC = os.environ['SNS_TOPIC']

          def handler(event, ctx):
            for rec in event.get('Records',[]):
              try:
                body = json.loads(rec['body'])
                action = body.get('action','unknown')
                task_id = body.get('taskId','')
                user = body.get('user','')
                msg = f'Task {action}: {task_id} by {user}'
                sns.publish(TopicArn=TOPIC, Subject='Task Notification', Message=msg)
                ddb.put_item(Item={
                  'pk': f'NOTIFY#{user}',
                  'sk': f'{int(time.time()*1000)}#{uuid.uuid4().hex[:8]}',
                  'action': action, 'taskId': task_id,
                  'ttl': int(time.time()) + 86400 * 7
                })
              except Exception as e:
                print(f'Worker error: {e}')
                raise

  WorkerEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt TaskQueue.Arn
      FunctionName: !Ref WorkerFunction
      BatchSize: 5
      MaximumBatchingWindowInSeconds: 10

  # ======================== S3 Deploy Lambda =============================== #
  S3DeployFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-s3-deploy'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt S3DeployRole.Arn
      Timeout: 120
      MemorySize: 256
      Code:
        ZipFile: |
          import cfnresponse, boto3, time

          s3 = boto3.client('s3')
          cf = boto3.client('cloudfront')

          def handler(event, context):
            try:
              props = event['ResourceProperties']
              bucket = props['BucketName']
              if event['RequestType'] == 'Delete':
                # Empty the bucket
                paginator = s3.get_paginator('list_objects_v2')
                for page in paginator.paginate(Bucket=bucket):
                  for obj in page.get('Contents', []):
                    s3.delete_object(Bucket=bucket, Key=obj['Key'])
                cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                return

              api = props['ApiEndpoint']
              region = props['Region']
              pool_id = props['UserPoolId']
              client_id = props['ClientId']
              cf_domain = props['CloudFrontDomain']
              dist_id = props.get('DistributionId', '')

              html = get_html(api, region, pool_id, client_id)
              s3.put_object(Bucket=bucket, Key='index.html', Body=html.encode('utf-8'),
                            ContentType='text/html; charset=utf-8', CacheControl='no-cache')

              if dist_id:
                try:
                  cf.create_invalidation(DistributionId=dist_id,
                    InvalidationBatch={'Paths':{'Quantity':1,'Items':['/*']},
                                       'CallerReference':str(time.time())})
                except Exception as e:
                  print(f'CloudFront invalidation skipped: {e}')

              cfnresponse.send(event, context, cfnresponse.SUCCESS,
                {'URL': f'https://{cf_domain}'})
            except Exception as e:
              print(str(e))
              cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

          def get_html(api, region, pool_id, client_id):
            return """<!DOCTYPE html>
          <html lang="ja">
          <head>
          <meta charset="UTF-8"/>
          <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
          <title>Task App | AWS Hands-on</title>
          <style>
          *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
          :root{--bg1:#0f0c29;--bg2:#302b63;--bg3:#24243e;--glass:rgba(255,255,255,.08);--glass-border:rgba(255,255,255,.12);--text:#f0f0f0;--muted:rgba(255,255,255,.5);--accent:#667eea;--accent2:#764ba2;--success:#48bb78;--danger:#fc8181;--warning:#f6ad55;--radius:14px;--shadow:0 8px 32px rgba(0,0,0,.3)}
          body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));color:var(--text);min-height:100vh;overflow-x:hidden}
          .hidden{display:none!important}
          /* Auth pages */
          .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
          .auth-card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:40px;width:100%;max-width:420px;box-shadow:var(--shadow)}
          .auth-card h1{font-size:1.8rem;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
          .auth-card .subtitle{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:28px}
          .auth-card .aws-tag{display:inline-block;background:linear-gradient(135deg,#ff9900,#ff6600);color:#fff;font-size:.65rem;padding:2px 10px;border-radius:20px;font-weight:700;margin-bottom:8px}
          .form-group{margin-bottom:18px}
          .form-group label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:6px;font-weight:600}
          .form-group input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--glass-border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:.9rem;outline:none;transition:border .2s}
          .form-group input:focus{border-color:var(--accent)}
          .form-group input::placeholder{color:rgba(255,255,255,.25)}
          .btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:6px}
          .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
          .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
          .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
          .auth-link{text-align:center;margin-top:20px;font-size:.84rem;color:var(--muted)}
          .auth-link a{color:var(--accent);cursor:pointer;text-decoration:underline}
          .msg{padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:14px;display:none}
          .msg.err{display:block;background:rgba(252,129,129,.12);color:var(--danger);border:1px solid rgba(252,129,129,.2)}
          .msg.ok{display:block;background:rgba(72,187,120,.12);color:var(--success);border:1px solid rgba(72,187,120,.2)}
          /* App layout */
          .app-header{background:rgba(15,12,41,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--glass-border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
          .app-header .logo{font-size:1.15rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
          .app-header .right{display:flex;align-items:center;gap:14px}
          .user-badge{font-size:.8rem;color:var(--muted);background:var(--glass);padding:6px 14px;border-radius:20px;border:1px solid var(--glass-border)}
          .btn-sm{padding:7px 16px;border:1px solid var(--glass-border);background:var(--glass);color:var(--text);border-radius:8px;font-size:.82rem;cursor:pointer;transition:all .2s}
          .btn-sm:hover{background:rgba(255,255,255,.12)}
          .btn-logout{border-color:rgba(252,129,129,.3);color:var(--danger)}
          .app-body{max-width:900px;margin:28px auto;padding:0 20px;display:grid;grid-template-columns:1fr 280px;gap:20px}
          @media(max-width:768px){.app-body{grid-template-columns:1fr}}
          .card{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
          .card h2{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:14px;font-weight:700}
          /* Add task */
          .add-row{display:flex;gap:10px}
          .add-row input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--glass-border);border-radius:10px;padding:11px 16px;color:var(--text);font-size:.9rem;outline:none;transition:border .2s}
          .add-row input:focus{border-color:var(--accent)}
          .add-row input::placeholder{color:rgba(255,255,255,.25)}
          .add-row button{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;padding:11px 22px;font-weight:700;font-size:.9rem;cursor:pointer;white-space:nowrap;transition:all .2s}
          .add-row button:hover{opacity:.9}
          /* Task list */
          .task-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--glass-border);transition:all .2s}
          .task-item:last-child{border-bottom:none}
          .task-item.done .task-title{text-decoration:line-through;color:var(--muted)}
          .chk{width:22px;height:22px;border:2px solid var(--glass-border);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;transition:all .18s;user-select:none}
          .chk.on{background:var(--success);border-color:var(--success);color:#fff}
          .chk:hover{border-color:var(--accent)}
          .task-title{flex:1;font-size:.9rem;word-break:break-word}
          .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:6px;font-size:.85rem;opacity:0;transition:all .15s}
          .task-item:hover .del-btn{opacity:1}
          .del-btn:hover{color:var(--danger)}
          .empty{text-align:center;padding:36px 0;color:var(--muted);font-size:.88rem;line-height:1.8}
          .empty .icon{font-size:2.4rem;margin-bottom:8px}
          /* Stats */
          .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
          .stat-box{background:rgba(255,255,255,.04);border-radius:10px;padding:14px;text-align:center;border:1px solid var(--glass-border)}
          .stat-box .num{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
          .stat-box .lbl{font-size:.7rem;color:var(--muted);margin-top:2px}
          /* Profile */
          .profile-info{display:flex;flex-direction:column;gap:10px;font-size:.85rem}
          .profile-info .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--glass-border)}
          .profile-info .row:last-child{border:none}
          .profile-info .lbl{color:var(--muted)}
          .profile-edit{margin-top:10px;display:flex;gap:8px}
          .profile-edit input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--glass-border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:.82rem;outline:none}
          .profile-edit button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:.82rem;cursor:pointer;font-weight:600}
          /* Log */
          .log-entries{font-family:'Cascadia Code',monospace;font-size:.72rem;max-height:180px;overflow-y:auto}
          .log-entry{padding:4px 10px;border-radius:6px;margin-bottom:3px;display:flex;gap:10px;align-items:baseline}
          .log-entry.ok{background:rgba(72,187,120,.08);color:var(--success)}
          .log-entry.err{background:rgba(252,129,129,.08);color:var(--danger)}
          .log-time{color:var(--muted);flex-shrink:0}
          /* Scrollbar */
          ::-webkit-scrollbar{width:6px}
          ::-webkit-scrollbar-track{background:transparent}
          ::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:3px}
          /* Loading */
          .spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--glass-border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
          @keyframes spin{to{transform:rotate(360deg)}}
          </style>
          </head>
          <body>
          <!-- ===== Login ===== -->
          <div id="login-view" class="view auth-wrap">
          <div class="auth-card">
          <div style="text-align:center"><span class="aws-tag">AWS Hands-on</span></div>
          <h1>Task App</h1>
          <p class="subtitle">会員制タスク管理アプリケーション</p>
          <div id="login-msg" class="msg"></div>
          <div class="form-group"><label>メールアドレス</label><input id="login-email" type="email" placeholder="you@example.com"/></div>
          <div class="form-group"><label>パスワード</label><input id="login-password" type="password" placeholder="8文字以上（大小英数字）"/></div>
          <button class="btn btn-primary" id="login-btn" onclick="doLogin()">ログイン</button>
          <p class="auth-link">アカウントをお持ちでない方は <a onclick="showView('register')">新規登録</a></p>
          </div></div>
          <!-- ===== Register ===== -->
          <div id="register-view" class="view auth-wrap hidden">
          <div class="auth-card">
          <div style="text-align:center"><span class="aws-tag">AWS Hands-on</span></div>
          <h1>新規登録</h1>
          <p class="subtitle">メールアドレスで会員登録</p>
          <div id="reg-msg" class="msg"></div>
          <div class="form-group"><label>メールアドレス</label><input id="reg-email" type="email" placeholder="you@example.com"/></div>
          <div class="form-group"><label>パスワード</label><input id="reg-password" type="password" placeholder="8文字以上（大小英数字）"/></div>
          <div class="form-group"><label>パスワード（確認）</label><input id="reg-password2" type="password" placeholder="もう一度入力"/></div>
          <button class="btn btn-primary" onclick="doRegister()">登録する</button>
          <p class="auth-link">アカウントをお持ちの方は <a onclick="showView('login')">ログイン</a></p>
          </div></div>
          <!-- ===== Verify ===== -->
          <div id="verify-view" class="view auth-wrap hidden">
          <div class="auth-card">
          <div style="text-align:center"><span class="aws-tag">AWS Hands-on</span></div>
          <h1>メール確認</h1>
          <p class="subtitle">登録メールアドレスに届いた確認コードを入力してください</p>
          <div id="verify-msg" class="msg"></div>
          <div class="form-group"><label>確認コード</label><input id="verify-code" type="text" placeholder="6桁の確認コード" maxlength="6"/></div>
          <button class="btn btn-primary" onclick="doVerify()">確認する</button>
          <p class="auth-link"><a onclick="doResend()">確認コードを再送信</a></p>
          </div></div>
          <!-- ===== Main App ===== -->
          <div id="app-view" class="view hidden">
          <div class="app-header">
            <span class="logo">Task App</span>
            <div class="right">
              <span class="user-badge" id="user-email"></span>
              <button class="btn-sm" onclick="showProfile()">プロフィール</button>
              <button class="btn-sm btn-logout" onclick="doLogout()">ログアウト</button>
            </div>
          </div>
          <div class="app-body">
            <div class="main-col">
              <div class="card"><h2>タスクを追加</h2>
                <div class="add-row">
                  <input id="taskInput" type="text" placeholder="新しいタスクを入力…" maxlength="200" onkeydown="if(event.key==='Enter')addTask()"/>
                  <button onclick="addTask()">追加</button>
                </div>
              </div>
              <div class="card"><h2>タスク一覧 <span id="taskBadge" style="float:right;font-weight:400"></span></h2>
                <div id="taskList"><div class="empty"><div class="icon"><div class="spinner"></div></div>読み込み中…</div></div>
              </div>
              <div class="card"><h2>API ログ</h2>
                <div class="log-entries" id="logEntries"><div style="color:var(--muted);font-size:.78rem">API を呼び出すとここにログが表示されます</div></div>
              </div>
            </div>
            <div class="side-col">
              <div class="card"><h2>統計</h2>
                <div class="stat-grid">
                  <div class="stat-box"><div class="num" id="stat-total">0</div><div class="lbl">全タスク</div></div>
                  <div class="stat-box"><div class="num" id="stat-done">0</div><div class="lbl">完了</div></div>
                  <div class="stat-box"><div class="num" id="stat-pending">0</div><div class="lbl">未完了</div></div>
                  <div class="stat-box"><div class="num" id="stat-rate">0%</div><div class="lbl">完了率</div></div>
                </div>
              </div>
              <div class="card"><h2>プロフィール</h2>
                <div class="profile-info">
                  <div class="row"><span class="lbl">メール</span><span id="prof-email">-</span></div>
                  <div class="row"><span class="lbl">表示名</span><span id="prof-name">-</span></div>
                </div>
                <div class="profile-edit">
                  <input id="prof-name-input" placeholder="表示名を変更"/>
                  <button onclick="updateProfile()">保存</button>
                </div>
              </div>
              <div class="card" style="text-align:center;font-size:.75rem;color:var(--muted)">
                <p>Powered by AWS</p>
                <p style="margin-top:4px">CloudFormation / Cognito / DynamoDB<br/>API Gateway / Lambda / CloudFront<br/>S3 / SQS / SNS</p>
              </div>
            </div>
          </div>
          </div>
          <script>
          'use strict';
          const API='""" + api + """';
          const REGION='""" + region + """';
          const POOL_ID='""" + pool_id + """';
          const CLIENT_ID='""" + client_id + """';
          const COGNITO_EP='https://cognito-idp.'+REGION+'.amazonaws.com/';
          let tasks=[],pendingEmail='';

          /* --- View switching --- */
          function showView(v){document.querySelectorAll('.view').forEach(el=>el.classList.add('hidden'));document.getElementById(v+'-view').classList.remove('hidden')}

          /* --- Cognito helpers --- */
          async function cognitoCall(target,body){
            const r=await fetch(COGNITO_EP,{method:'POST',headers:{'Content-Type':'application/x-amz-json-1.1','X-Amz-Target':'AWSCognitoIdentityProviderService.'+target},body:JSON.stringify(body)});
            const d=await r.json();if(d.__type)throw new Error(d.message||d.__type);return d;
          }

          function showMsg(id,msg,ok){const el=document.getElementById(id);el.textContent=msg;el.className='msg '+(ok?'ok':'err')}
          function clearMsg(id){document.getElementById(id).className='msg';document.getElementById(id).textContent=''}

          async function doLogin(){
            clearMsg('login-msg');
            const email=document.getElementById('login-email').value.trim();
            const pw=document.getElementById('login-password').value;
            if(!email||!pw){showMsg('login-msg','入力してください',false);return}
            try{
              const r=await cognitoCall('InitiateAuth',{AuthFlow:'USER_PASSWORD_AUTH',ClientId:CLIENT_ID,AuthParameters:{USERNAME:email,PASSWORD:pw}});
              localStorage.setItem('idToken',r.AuthenticationResult.IdToken);
              localStorage.setItem('accessToken',r.AuthenticationResult.AccessToken);
              localStorage.setItem('refreshToken',r.AuthenticationResult.RefreshToken);
              localStorage.setItem('email',email);
              enterApp(email);
            }catch(e){
              if(e.message&&e.message.includes('not confirmed')){pendingEmail=email;showView('verify');showMsg('verify-msg','メールアドレスの確認が必要です',false);return}
              showMsg('login-msg',e.message||'ログインに失敗しました',false);
            }
          }

          async function doRegister(){
            clearMsg('reg-msg');
            const email=document.getElementById('reg-email').value.trim();
            const pw=document.getElementById('reg-password').value;
            const pw2=document.getElementById('reg-password2').value;
            if(!email||!pw){showMsg('reg-msg','入力してください',false);return}
            if(pw!==pw2){showMsg('reg-msg','パスワードが一致しません',false);return}
            if(pw.length<8){showMsg('reg-msg','パスワードは8文字以上にしてください',false);return}
            try{
              await cognitoCall('SignUp',{ClientId:CLIENT_ID,Username:email,Password:pw,UserAttributes:[{Name:'email',Value:email}]});
              pendingEmail=email;showView('verify');showMsg('verify-msg','確認コードを送信しました',true);
            }catch(e){showMsg('reg-msg',e.message||'登録に失敗しました',false)}
          }

          async function doVerify(){
            clearMsg('verify-msg');
            const code=document.getElementById('verify-code').value.trim();
            if(!code){showMsg('verify-msg','確認コードを入力してください',false);return}
            try{
              await cognitoCall('ConfirmSignUp',{ClientId:CLIENT_ID,Username:pendingEmail,ConfirmationCode:code});
              showView('login');showMsg('login-msg','登録完了！ログインしてください',true);
            }catch(e){showMsg('verify-msg',e.message||'確認に失敗しました',false)}
          }

          async function doResend(){
            try{await cognitoCall('ResendConfirmationCode',{ClientId:CLIENT_ID,Username:pendingEmail});showMsg('verify-msg','確認コードを再送信しました',true)}catch(e){showMsg('verify-msg',e.message||'再送信に失敗しました',false)}
          }

          function doLogout(){localStorage.clear();tasks=[];showView('login')}
          function enterApp(email){document.getElementById('user-email').textContent=email;showView('app');loadTasks();loadProfile()}

          /* --- API calls --- */
          async function callApi(method,path,body){
            const token=localStorage.getItem('idToken');
            if(!token){doLogout();return null}
            const opts={method,headers:{'Content-Type':'application/json','Authorization':token}};
            if(body!==undefined)opts.body=JSON.stringify(body);
            try{
              const r=await fetch(API+path,opts);
              if(r.status===401){doLogout();return null}
              const d=await r.json();addLog(method,path,r.status,r.ok);
              if(!r.ok)throw new Error(d.error||r.statusText);return d;
            }catch(e){addLog(method,path,e.message||'error',false);return null}
          }

          function addLog(m,p,s,ok){
            const el=document.getElementById('logEntries');
            if(el.children.length===1&&!el.children[0].classList.contains('log-entry'))el.innerHTML='';
            const d=document.createElement('div');d.className='log-entry '+(ok?'ok':'err');
            d.innerHTML='<span class="log-time">'+new Date().toLocaleTimeString('ja-JP')+'</span><span>'+m+' '+esc(p)+'</span><span>→ '+s+'</span>';
            el.insertBefore(d,el.firstChild);while(el.children.length>30)el.removeChild(el.lastChild);
          }

          /* --- Tasks --- */
          async function loadTasks(){
            const d=await callApi('GET','/tasks');
            if(d===null)return;tasks=d;renderTasks();updateStats();
          }
          async function addTask(){
            const inp=document.getElementById('taskInput');const t=inp.value.trim();if(!t)return;
            const r=await callApi('POST','/tasks',{title:t});
            if(r){inp.value='';tasks.unshift(r);renderTasks();updateStats();}
          }
          async function toggleTask(id,c){
            const r=await callApi('PUT','/tasks/'+id,{completed:c});
            if(r){const i=tasks.findIndex(t=>t.id===id);if(i!==-1)tasks[i].completed=r.completed;renderTasks();updateStats();}
          }
          async function deleteTask(id){
            if(!confirm('削除しますか？'))return;
            const r=await callApi('DELETE','/tasks/'+id);
            if(r!==null){tasks=tasks.filter(t=>t.id!==id);renderTasks();updateStats();}
          }
          function renderTasks(){
            const el=document.getElementById('taskList');
            const pending=tasks.filter(t=>!t.completed).length;
            document.getElementById('taskBadge').textContent=tasks.length?pending+' / '+tasks.length+' 件':'';
            if(!tasks.length){el.innerHTML='<div class="empty"><div class="icon">✨</div>タスクはありません<br>上のフォームから追加してください</div>';return}
            el.innerHTML=tasks.map(t=>'<div class="task-item'+(t.completed?' done':'')+'"><div class="chk'+(t.completed?' on':'')+'" onclick="toggleTask(\\''+t.id+'\\','+(!t.completed)+')">'+(t.completed?'✓':'')+'</div><span class="task-title">'+esc(t.title)+'</span><button class="del-btn" onclick="deleteTask(\\''+t.id+'\\')">🗑</button></div>').join('');
          }
          function updateStats(){
            const total=tasks.length,done=tasks.filter(t=>t.completed).length;
            document.getElementById('stat-total').textContent=total;
            document.getElementById('stat-done').textContent=done;
            document.getElementById('stat-pending').textContent=total-done;
            document.getElementById('stat-rate').textContent=total?Math.round(done/total*100)+'%':'0%';
          }

          /* --- Profile --- */
          async function loadProfile(){
            const d=await callApi('GET','/profile');
            if(d){document.getElementById('prof-email').textContent=d.email||'-';document.getElementById('prof-name').textContent=d.display_name||'-';document.getElementById('prof-name-input').value=d.display_name||''}
          }
          function showProfile(){document.getElementById('prof-name-input').focus()}
          async function updateProfile(){
            const n=document.getElementById('prof-name-input').value.trim();if(!n)return;
            const r=await callApi('PUT','/profile',{display_name:n});
            if(r)document.getElementById('prof-name').textContent=r.display_name;
          }
          function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

          /* --- Init --- */
          (function(){
            const token=localStorage.getItem('idToken');
            const email=localStorage.getItem('email');
            if(token&&email){enterApp(email)}else{showView('login')}
          })();
          </script>
          </body></html>"""

  # ======================== S3 (Frontend) ================================= #
  FrontendBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub '${ProjectName}-frontend-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-frontend'

  # ======================== CloudFront ==================================== #
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${ProjectName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${ProjectName} frontend'
        DefaultRootObject: index.html
        Origins:
          - DomainName: !GetAtt FrontendBucket.RegionalDomainName
            Id: S3Origin
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          ForwardedValues:
            QueryString: false
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        HttpVersion: http2
        PriceClass: PriceClass_200

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # ======================== API Gateway ==================================== #
  TasksApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${ProjectName}-api'
      Description: Task App REST API with Cognito auth

  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: CognitoAuth
      Type: COGNITO_USER_POOLS
      RestApiId: !Ref TasksApi
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !GetAtt UserPool.Arn

  # /tasks
  TasksResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TasksApi
      ParentId: !GetAtt TasksApi.RootResourceId
      PathPart: tasks

  # /tasks/{id}
  TaskIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TasksApi
      ParentId: !Ref TasksResource
      PathPart: '{id}'

  # /profile
  ProfileResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TasksApi
      ParentId: !GetAtt TasksApi.RootResourceId
      PathPart: profile

  # GET /tasks
  GetTasksMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TasksApi
      ResourceId: !Ref TasksResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Arn}/invocations'
          - Arn: !GetAtt AppFunction.Arn

  # POST /tasks
  PostTasksMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TasksApi
      ResourceId: !Ref TasksResource
      HttpMethod: POST
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Arn}/invocations'
          - Arn: !GetAtt AppFunction.Arn

  # OPTIONS /tasks
  OptionsTasksMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TasksApi
      ResourceId: !Ref TasksResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode":200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # PUT /tasks/{id}
  PutTaskMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TasksApi
      ResourceId: !Ref TaskIdResource
      HttpMethod: PUT
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Arn}/invocations'
          - Arn: !GetAtt AppFunction.Arn

  # DELETE /tasks/{id}
  DeleteTaskMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TasksApi
      ResourceId: !Ref TaskIdResource
      HttpMethod: DELETE
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Arn}/invocations'
          - Arn: !GetAtt AppFunction.Arn

  # OPTIONS /tasks/{id}
  OptionsTaskIdMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TasksApi
      ResourceId: !Ref TaskIdResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode":200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'PUT,DELETE,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # GET /profile
  GetProfileMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TasksApi
      ResourceId: !Ref ProfileResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Arn}/invocations'
          - Arn: !GetAtt AppFunction.Arn

  # PUT /profile
  PutProfileMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TasksApi
      ResourceId: !Ref ProfileResource
      HttpMethod: PUT
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref CognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Arn}/invocations'
          - Arn: !GetAtt AppFunction.Arn

  # OPTIONS /profile
  OptionsProfileMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TasksApi
      ResourceId: !Ref ProfileResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode":200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,PUT,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # API Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - GetTasksMethod
      - PostTasksMethod
      - OptionsTasksMethod
      - PutTaskMethod
      - DeleteTaskMethod
      - OptionsTaskIdMethod
      - GetProfileMethod
      - PutProfileMethod
      - OptionsProfileMethod
    Properties:
      RestApiId: !Ref TasksApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref TasksApi
      DeploymentId: !Ref ApiDeployment
      StageName: prod
      MethodSettings:
        - HttpMethod: '*'
          ResourcePath: '/*'
          ThrottlingRateLimit: 100
          ThrottlingBurstLimit: 50

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AppFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TasksApi}/*'

  # ======================== Custom Resources =============================== #
  S3DeployCustomResource:
    Type: Custom::S3Deploy
    DependsOn:
      - FrontendBucketPolicy
      - ApiStage
      - CloudFrontDistribution
    Properties:
      ServiceToken: !GetAtt S3DeployFunction.Arn
      BucketName: !Sub '${ProjectName}-frontend-${AWS::AccountId}'
      ApiEndpoint: !Sub 'https://${TasksApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
      Region: !Ref 'AWS::Region'
      UserPoolId: !Ref UserPool
      ClientId: !Ref UserPoolClient
      CloudFrontDomain: !GetAtt CloudFrontDistribution.DomainName
      DistributionId: !Ref CloudFrontDistribution
      Version: '1.0.0'

  # ======================== CloudWatch ===================================== #
  AppDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub '${ProjectName}-dashboard'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${AppFunction}"],
                  ["AWS/Lambda", "Errors", "FunctionName", "${AppFunction}"],
                  ["AWS/Lambda", "Duration", "FunctionName", "${AppFunction}"]
                ],
                "title": "App Lambda メトリクス",
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${WorkerFunction}"],
                  ["AWS/Lambda", "Errors", "FunctionName", "${WorkerFunction}"]
                ],
                "title": "Worker Lambda メトリクス",
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/ApiGateway", "Count", "ApiName", "${ProjectName}-api"],
                  ["AWS/ApiGateway", "4XXError", "ApiName", "${ProjectName}-api"],
                  ["AWS/ApiGateway", "5XXError", "ApiName", "${ProjectName}-api"]
                ],
                "title": "API Gateway メトリクス",
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/SQS", "NumberOfMessagesSent", "QueueName", "${ProjectName}-task-queue"],
                  ["AWS/SQS", "NumberOfMessagesReceived", "QueueName", "${ProjectName}-task-queue"],
                  ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "${ProjectName}-task-queue"]
                ],
                "title": "SQS メトリクス",
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 12, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/CloudFront", "Requests", "DistributionId", "${CloudFrontDistribution}", "Region", "Global"],
                  ["AWS/CloudFront", "BytesDownloaded", "DistributionId", "${CloudFrontDistribution}", "Region", "Global"]
                ],
                "title": "CloudFront メトリクス",
                "region": "us-east-1",
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 12, "width": 12, "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/Cognito", "SignUpSuccesses", "UserPool", "${UserPool}", "UserPoolClient", "${UserPoolClient}"],
                  ["AWS/Cognito", "TokenRefreshSuccesses", "UserPool", "${UserPool}", "UserPoolClient", "${UserPoolClient}"]
                ],
                "title": "Cognito メトリクス",
                "region": "${AWS::Region}",
                "period": 300,
                "stat": "Sum"
              }
            }
          ]
        }

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-app-lambda-errors'
      AlarmDescription: App Lambda でエラーが発生しています
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AppFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref NotificationTopic
      TreatMissingData: notBreaching

  ApiErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-api-5xx-errors'
      AlarmDescription: API Gateway で 5XX エラーが発生しています
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Sub '${ProjectName}-api'
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref NotificationTopic
      TreatMissingData: notBreaching

# =========================================================================== #
# Outputs                                                                      #
# =========================================================================== #
Outputs:
  CloudFrontURL:
    Description: アプリケーションの URL（CloudFront 経由）
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'

  ApiEndpoint:
    Description: API Gateway エンドポイント URL
    Value: !Sub 'https://${TasksApi}.execute-api.${AWS::Region}.amazonaws.com/prod'

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  CognitoClientId:
    Description: Cognito App Client ID
    Value: !Ref UserPoolClient

  CognitoDomain:
    Description: Cognito ドメイン
    Value: !Sub '${ProjectName}-auth-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com'

  TasksTableName:
    Description: タスク保存用 DynamoDB テーブル名
    Value: !Ref TasksTable

  UserProfilesTableName:
    Description: プロフィール保存用 DynamoDB テーブル名
    Value: !Ref UserProfilesTable

  FrontendBucketName:
    Description: フロントエンド S3 バケット名
    Value: !Ref FrontendBucket

  CloudFrontDistributionId:
    Description: CloudFront ディストリビューション ID
    Value: !Ref CloudFrontDistribution

  DashboardURL:
    Description: CloudWatch ダッシュボード URL
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${ProjectName}-dashboard'

  SNSTopicArn:
    Description: SNS 通知トピック ARN
    Value: !Ref NotificationTopic

  SQSQueueURL:
    Description: SQS キュー URL
    Value: !Ref TaskQueue
